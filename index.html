<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kit RPG Web</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">

        <h1> KIT RPG </h1>

        <!-- DADOS -->
        <section>
            <h2>Tirar Dados</h2>

    <div class="dados">
        <button onclick="tirarDado(6)">
            <img src="img/6.jpg" alt="d6">
            <span>d6</span>
        </button>

        <button onclick="tirarDado(10)">
            <img src="img/10.jpg" alt="d10">
            <span>d10</span>
        </button>

        <button onclick="tirarDado(20)">
            <img src="img/20" alt="d20">
            <span>d20</span>
        </button>
    </div>

    <p id="resultadoDado">Resultado: -</p>
</section>

        <!-- VIDA -->
        <section>
            <h2> Vida</h2>

            <div class="barra">
                <div id="vida"></div>
            </div>

            <p id="textoVida">100 / 100</p>

            <button onclick="cambiarVida(-10)">-10 daño</button>
            <button onclick="cambiarVida(10)">+10 curar</button>
        </section>

        <!-- INVENTARIO -->
        <section>
            <h2> Inventario</h2>

            <input type="text" id="objeto" placeholder="Nuevo objeto">

            <button onclick="agregarObjeto()">Agregar</button>

            <ul id="inventario"></ul>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
